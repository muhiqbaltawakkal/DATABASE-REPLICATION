services:

  master1:
    image: mysql:8.0
    container_name: master1
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3310:3306"
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW

  master2:
    image: mysql:8.0
    container_name: master2
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3311:3306"
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-format=ROW

  slave:
    image: mysql:8.0
    container_name: slave
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3312:3306"
    command:
      - --server-id=3
      - --log-bin=mysql-bin
      - --relay-log=relay-bin
      - --binlog-format=ROW